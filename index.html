<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أوسبيلدونغ إنفينيتي | الدليل الأقوى للعراقيين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00853d; --secondary: #004a99; --accent: #d69e2e;
            --dark: #121212; --light: #f4f7f6; --white: #ffffff;
        }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--light); margin: 0; color: var(--dark); overflow-x: hidden; }

        /* الهيدر الاحترافي */
        header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 1.6rem; font-weight: 900; color: var(--secondary); }
        .logo-area span { color: var(--primary); }

        /* قسم البحث المتقدم (Hero) */
        .hero-ai { background: linear-gradient(135deg, var(--dark) 0%, var(--secondary) 100%); color: white; padding: 100px 5% 60px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        .search-box { max-width: 900px; margin: 30px auto; background: white; padding: 10px; border-radius: 50px; display: flex; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .search-box input { flex: 1; border: none; padding: 15px 25px; font-size: 1.1rem; border-radius: 50px; outline: none; }
        .search-box button { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* نظام الفلترة */
        .filter-tags { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .tag-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .tag-btn:hover, .tag-btn.active { background: var(--accent); border-color: var(--accent); }

        /* قاعدة البيانات والبطاقات */
        .main-content { max-width: 1300px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .card-img { height: 200px; background-size: cover; background-position: center; position: relative; }
        .badge-salary { position: absolute; top: 15px; left: 15px; background: var(--primary); color: white; padding: 6px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-title { font-size: 1.4rem; font-weight: 800; color: var(--secondary); margin-bottom: 15px; }
        
        .feature-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .feature-item { font-size: 0.85rem; color: #555; display: flex; align-items: center; gap: 5px; }
        .feature-item i { color: var(--accent); }

        .btn-view { display: block; text-align: center; background: var(--secondary); color: white; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: auto; }

        /* حاسبة المعيشة المتقدمة */
        .calculator-pro { background: var(--white); border-radius: 30px; padding: 40px; margin: 60px auto; max-width: 1000px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 2px dashed var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">Ausbildung <span>Infinity</span> <i class="fas fa-infinity"></i></div>
    <div class="nav-links">
        <button class="tag-btn active" style="color: black;">الرئيسية</button>
        <button class="tag-btn" style="color: black;">خريطة الطريق</button>
    </div>
</header>

<section class="hero-ai">
    <h1>أكبر محرك بحث للأوسبيلدونغ في العراق</h1>
    <p>بيانات مباشرة ومحدثة لعام 2026 تحاكي أدق تفاصيل Ausbildung.de</p>
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="searchJobs()" placeholder="ابحث عن مهنة (IT، طبخ، تمريض، حلاقة)...">
        <button><i class="fas fa-search"></i> بحث ذكي</button>
    </div>
    <div class="filter-tags">
        <button class="tag-btn active">الكل</button>
        <button class="tag-btn">رواتب عالية</button>
        <button class="tag-btn">لغة سهلة</button>
        <button class="tag-btn">للإناث</button>
        <button class="tag-btn">سادس إعدادي</button>
    </div>
</section>

<main class="main-content" id="jobsGrid">
    </main>

<div class="calculator-pro">
    <h2 style="text-align:center; color: var(--primary);"><i class="fas fa-coins"></i> رادار الميزانية والفيزا</h2>
    <p style="text-align:center;">ادخل الراتب المعروض في عقدك لتعرف فرص قبول الفيزا في بغداد</p>
    <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap;">
        <input type="number" id="userSalary" placeholder="الراتب الإجمالي (Brutto)" style="padding:15px; border-radius:15px; border:1px solid #ddd; width:250px;">
        <button onclick="runRadar()" style="padding:15px 40px; background:var(--dark); color:white; border:none; border-radius:15px; cursor:pointer;">ابدأ التحليل</button>
    </div>
    <div id="radarResult" style="margin-top:30px; text-align:center; font-size:1.2rem;"></div>
</div>

<script>
    // قاعدة بيانات ضخمة مدمجة (JSON)
    const jobs = [
        { title: "أخصائي تقنية معلومات", salary: "1200€", lang: "B2", degree: "سادس علمي", time: "3 سنوات", img: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500", type: "رواتب عالية" },
        { title: "تمريض عام", salary: "1150€", lang: "B2", degree: "إعدادية", time: "3 سنوات", img: "https://images.unsplash.com/photo-1584515201143-6c770c0c1630?w=500", type: "رواتب عالية" },
        { title: "ميكانيك سيارات", salary: "980€", lang: "B1", degree: "ثالث متوسط", time: "3.5 سنة", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", type: "لغة سهلة" },
        { title: "طباخ محترف", salary: "900€", lang: "B1", degree: "متوسطة", time: "3 سنوات", img: "https://images.unsplash.com/photo-1577106263724-2c8e03bfe9cf?w=500", type: "لغة سهلة" },
        { title: "نجار فني", salary: "850€", lang: "B1", degree: "ابتدائي/متوسط", time: "3 سنوات", img: "https://images.unsplash.com/photo-1622396481328-9b1b78cdd9fd?w=500", type: "لغة سهلة" },
        { title: "حلاق ومصفف شعر", salary: "750€", lang: "A2/B1", degree: "لا يشترط", time: "2.5 سنة", img: "https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=500", type: "لغة سهلة" },
        { title: "إدارة مكاتب", salary: "1050€", lang: "B2", degree: "سادس أدبي/علمي", time: "3 سنوات", img: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=500", type: "رواتب عالية" }
    ];

    function displayJobs(filteredJobs) {
        const grid = document.getElementById('jobsGrid');
        grid.innerHTML = '';
        filteredJobs.forEach(job => {
            grid.innerHTML += `
                <div class="card">
                    <div class="badge-salary">${job.salary}</div>
                    <div class="card-img" style="background-image: url('${job.img}')"></div>
                    <div class="card-body">
                        <div class="card-title">${job.title}</div>
                        <div class="feature-list">
                            <div class="feature-item"><i class="fas fa-language"></i> اللغة: ${job.lang}</div>
                            <div class="feature-item"><i class="fas fa-graduation-cap"></i> ${job.degree}</div>
                            <div class="feature-item"><i class="fas fa-history"></i> المدة: ${job.time}</div>
                            <div class="feature-item"><i class="fas fa-chart-line"></i> الطلب: عالي جداً</div>
                        </div>
                        <a href="https://www.ausbildung.de/suche/?q=${job.title}" target="_blank" class="btn-view">عرض الفرص في ألمانيا</a>
                    </div>
                </div>
            `;
        });
    }

    function searchJobs() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = jobs.filter(j => j.title.toLowerCase().includes(term));
        displayJobs(filtered);
    }

    function runRadar() {
        const sal = document.getElementById('userSalary').value;
        const resultDiv = document.getElementById('radarResult');
        if(!sal) return;
        const netto = sal * 0.78; // حساب الصافي التقريبي
        if(netto >= 947) {
            resultDiv.innerHTML = `<span style="color:var(--primary)">✅ مبروك! راتبك الصافي (${netto.toFixed(0)}€) يغطي متطلبات الفيزا ولا تحتاج حساباً مغلقاً.</span>`;
        } else {
            const diff = 947 - netto;
            resultDiv.innerHTML = `<span style="color:var(--danger)">⚠️ الراتب الصافي (${netto.toFixed(0)}€) تحت الحد المطلوب. ستحتاج حساباً مغلقاً بمبلغ ${diff.toFixed(0)}€ شهرياً.</span>`;
        }
    }

    // تشغيل العرض الأولي
    displayJobs(jobs);
</script>

</body>
</html>
